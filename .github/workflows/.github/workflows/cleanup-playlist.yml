#!/usr/bin/env python3
# -*- coding: utf-8 -*-

def cleanup_playlist(input_file, output_file):
    """
    M3U playlist dosyasından duplicate kanalları kaldırır.
    Her kanal için yalnızca ilk versiyonu tutar.
    """
    seen_channels = {}
    output_lines = []
    
    try:
        with open(input_file, 'r', encoding='utf-8') as f:
            lines = f.readlines()
    except FileNotFoundError:
        print(f"❌ Hata: '{input_file}' dosyası bulunamadı!")
        return False
    except Exception as e:
        print(f"❌ Dosya okuma hatası: {e}")
        return False
    
    i = 0
    duplicate_count = 0
    channel_count = 0
    
    while i < len(lines):
        line = lines[i]
        
        # #EXTINF satırını kontrol et (kanal tanımı)
        if line.startswith('#EXTINF:-1'):
            # Kanal adını çıkart (virgülden sonrası)
            try:
                channel_name = line.split(',', 1)[-1].strip()
            except:
                channel_name = "Unknown"
            
            if channel_name not in seen_channels:
                # İlk kez gördüğümüz kanal - kaydet
                output_lines.append(line)
                if i + 1 < len(lines):
                    output_lines.append(lines[i + 1])  # URL satırını ekle
                seen_channels[channel_name] = True
                channel_count += 1
                i += 2
            else:
                # Önceden gördüğümüz kanal - atla (duplicate)
                duplicate_count += 1
                i += 2
        else:
            # Diğer satırları (header, boş satırlar vb.) kopyala
            output_lines.append(line)
            i += 1
    
    # Temizlenmiş dosyayı yaz
    try:
        with open(output_file, 'w', encoding='utf-8') as f:
            f.writelines(output_lines)
    except Exception as e:
        print(f"❌ Dosya yazma hatası: {e}")
        return False
    
    # Sonuçları göster
    print("=" * 50)
    print("✅ Playlist temizleme tamamlandı!")
    print("=" * 50)
    print(f"📁 Input dosyası: {input_file}")
    print(f"📁 Output dosyası: {output_file}")
    print(f"📊 Benzersiz kanallar: {channel_count}")
    print(f"🗑️  Silinen duplicates: {duplicate_count}")
    print(f"📉 Toplam satır: {len(lines)} → {len(output_lines)}")
    print("=" * 50)
    
    return True


if __name__ == "__main__":
    # Dosya adlarını buraya yazın
    input_playlist = "playlist.m3u"      # Orijinal dosya
    output_playlist = "playlist_cleaned.m3u"  # Temizlenmiş dosya
    
    cleanup_playlist(input_playlist, output_playlist)
