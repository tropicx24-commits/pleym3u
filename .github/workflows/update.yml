      - name: Build playlist
       
          echo "#EXTM3U" > playlist.m3u

          while IFS= read -r url || [ -n "$url" ]; do

            # Boş satırları geç
           [ -z "$url" ] && continue

            # Yorum satırlarını geç
            [[ "$url" =~ ^# ]] && continue

            echo "===================================="
            echo "Downloading: $url"

            if ! curl -L --fail "$url" -o "tmp.m3u"; then
              echo "FAILED"
              continue
            fi

            ###################################################
            # Normal M3U Playlist
            ###################################################
            if grep -q "^#EXTINF" tmp.m3u; then

              awk '
              /^#EXTINF/{
                  extinf=$0
                  getline stream
                  gsub(/\r/,"",stream)

                  if(!seen[stream]++){
                      print extinf
                      print stream
                  }
              }
              ' tmp.m3u >> playlist.m3u

            ###################################################
            # Tek kanal HLS (.m3u8)
            ###################################################
            elif grep -q "^#EXT-X-STREAM-INF" tmp.m3u; then

              name=$(basename "$url" .m3u8)
              name=${name//_/ }

              stream=$(grep '^https://' tmp.m3u | head -1)

              if [ -n "$stream" ]; then
                echo "#EXTINF:-1,$name" >> playlist.m3u
                echo "$stream" >> playlist.m3u
              fi

            fi

          done < sources.txt

          rm -f tmp.m3u

          ###################################################
          # Aynı URL'leri tekrar sil
          ###################################################
          awk '
          BEGIN{
              print "#EXTM3U"
          }

          /^#EXTINF/{
              ext=$0
              getline url

              if(!u[url]++){
                  print ext
                  print url
              }
          }
          ' playlist.m3u > clean.m3u

          mv clean.m3u playlist.m3u

          echo ""
          echo "Toplam kanal:"
          grep -c "^#EXTINF" playlist.m3u
