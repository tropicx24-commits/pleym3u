name: Cleanup Playlist Duplicates

on:
  schedule:
    - cron: '0 2 * * *'  # Her gün saat 2:00 de çalış
  workflow_dispatch:     # Manual olarak da çalıştırabilirsin

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run cleanup script
        run: python3 cleanup_playlist.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-cleanup: Remove duplicate channels" && git push)
